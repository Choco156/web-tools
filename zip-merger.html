<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIP Merger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --error: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 56px;
    background: rgba(17,17,24,0.95);
    border-right: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    z-index: 100;
    transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    backdrop-filter: blur(12px);
  }
  .sidebar:hover { width: 180px; }

  .sidebar-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-bottom: 28px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    padding: 0 8px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 4px 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    color: #64748b;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    min-height: 40px;
  }
  .sidebar-item:hover { background: rgba(124,58,237,0.1); color: #e2e8f0; }
  .sidebar-item.active {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
  }

  .sidebar-icon {
    font-size: 17px;
    flex-shrink: 0;
    width: 24px;
    text-align: center;
  }

  .sidebar-label {
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.15s 0.05s;
    letter-spacing: 0.01em;
  }
  .sidebar:hover .sidebar-label { opacity: 1; }

  .sidebar-divider {
    width: 32px;
    height: 1px;
    background: #1e1e2e;
    margin: 8px auto;
    transition: width 0.22s;
  }
  .sidebar:hover .sidebar-divider { width: calc(100% - 16px); }

  .sidebar-section-title {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #2d2d3e;
    padding: 0 12px;
    margin-bottom: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .sidebar:hover .sidebar-section-title { opacity: 1; }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 600px; height: 600px; background: rgba(124,58,237,0.08); top: -200px; right: -200px; }
  .orb2 { width: 400px; height: 400px; background: rgba(6,182,212,0.06); bottom: -100px; left: -100px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 920px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 24px 80px;
    padding-left: calc(56px + 24px);
    flex: 1;
  }

  /* Header */
  header {
    margin-bottom: 52px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badge::before { content: '◈'; font-size: 9px; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  h1 .line1 { color: var(--text); display: block; }
  h1 .line2 {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 14px;
    font-size: 15px;
    color: var(--muted);
    font-weight: 400;
    max-width: 420px;
    line-height: 1.6;
  }

  /* Drop Zone */
  .dropzone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 52px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 28px;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.06) 0%, rgba(6,182,212,0.06) 100%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(124,58,237,0.15), 0 20px 40px rgba(0,0,0,0.3);
  }

  .dropzone:hover::before, .dropzone.drag-over::before { opacity: 1; }

  .dropzone.drag-over { border-color: var(--accent2); border-style: solid; }

  .drop-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.15));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
  }

  .dropzone:hover .drop-icon { transform: scale(1.1) rotate(5deg); }

  .drop-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .drop-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    position: relative;
    z-index: 1;
  }

  .drop-sub span {
    color: var(--accent2);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(6,182,212,0.4);
  }

  #fileInput { display: none; }

  /* File List */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    min-height: 0;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.2s ease;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-item:hover { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.05); }

  .file-item.status-processing { border-color: rgba(245,158,11,0.4); }
  .file-item.status-done { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.04); }
  .file-item.status-error { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.04); }

  .file-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #1e1e2e, #2d1b69);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .file-status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .status-waiting { color: var(--muted); background: rgba(100,116,139,0.1); }
  .status-processing { color: var(--accent3); background: rgba(245,158,11,0.1); animation: pulse 1s infinite; }
  .status-done { color: var(--success); background: rgba(16,185,129,0.1); }
  .status-error { color: var(--error); background: rgba(239,68,68,0.1); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .file-remove {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .file-remove:hover { background: rgba(239,68,68,0.15); color: var(--error); }

  /* Options */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }

  .option-label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .option-card input:checked + .option-label {
    border-color: var(--accent);
    background: rgba(124,58,237,0.08);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .option-label:hover { border-color: rgba(124,58,237,0.4); }

  .option-info { flex: 1; }

  .option-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .option-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    font-family: 'Space Mono', monospace;
  }

  /* Radio dot indicator */
  .option-radio-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .option-card input:checked + .option-label .option-radio-dot {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
  }
  .option-card input:checked + .option-label .option-radio-dot::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: white;
  }

  /* Merge button */
  .merge-btn {
    width: auto;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .merge-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .merge-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,58,237,0.4);
  }
  .merge-btn:hover:not(:disabled)::before { opacity: 1; }
  .merge-btn:active:not(:disabled) { transform: translateY(0); }
  .merge-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .merge-btn .btn-icon { font-size: 20px; }

  /* Progress */
  .progress-wrap {
    margin-bottom: 28px;
    display: none;
  }

  .progress-wrap.visible { display: block; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .progress-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent2);
  }

  /* Stats */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 28px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-val.accent { color: var(--accent); }
  .stat-val.accent2 { color: var(--accent2); }

  .stat-key {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Log */
  .log-wrap {
    display: none;
    margin-top: 20px;
  }
  .log-wrap.visible { display: block; }

  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    max-height: 180px;
    overflow-y: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
  }

  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { display: flex; gap: 10px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); }
  .log-msg.ok { color: var(--success); }
  .log-msg.warn { color: var(--accent3); }
  .log-msg.err { color: var(--error); }
  .log-msg.info { color: var(--accent2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: none;
  }

  .empty-state.visible { display: block; }

  /* Output filename */
  .output-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .input-field {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }

  .input-suffix {
    display: flex;
    align-items: center;
    padding: 0 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* Button row */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 0;
  }

  /* Download button */
  .download-btn {
    width: auto;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--success), #059669);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .download-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(16,185,129,0.4);
  }
  .download-btn:active:not(:disabled) { transform: translateY(0); }
  .download-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .download-btn .btn-icon { font-size: 20px; }

  /* Checkbox option */
  .checkbox-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 28px;
  }
  .checkbox-option:hover { border-color: rgba(124,58,237,0.4); }
  .checkbox-option input[type="checkbox"] { display: none; }
  .checkbox-box {
    width: 18px;
    height: 18px;
    border: 2px solid var(--muted);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
  }
  .checkbox-option input:checked ~ .checkbox-box,
  .checkbox-option.checked .checkbox-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox-option.checked { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.05); }
  .checkbox-text { font-size: 13px; font-weight: 600; color: var(--text); }
  .checkbox-desc { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-left: auto; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: var(--success); }
  .toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: var(--error); }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">🛠</div>
  <div class="sidebar-nav">
    <div class="sidebar-section-title">Tools</div>
    <a class="sidebar-item" href="index.html">
      <span class="sidebar-icon">⚡</span>
      <span class="sidebar-label">키워드 툴</span>
    </a>
    <a class="sidebar-item active" href="zip-merger.html">
      <span class="sidebar-icon">📦</span>
      <span class="sidebar-label">ZIP Merger</span>
    </a>
  </div>
</nav>

<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="container">
  <header>
    <div class="badge">Browser-only · No Upload · Secure</div>
    <h1>
      <span class="line1">ZIP</span>
      <span class="line2">MERGER</span>
    </h1>
    <p class="subtitle">여러 개의 ZIP 파일을 압축 해제하고 하나로 합쳐 다운로드합니다.</p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val accent" id="stat-files">0</span>
      <span class="stat-key">파일 수</span>
    </div>
    <div class="stat">
      <span class="stat-val accent2" id="stat-size">0 KB</span>
      <span class="stat-key">총 크기</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-entries">—</span>
      <span class="stat-key">항목 수</span>
    </div>
  </div>

  <!-- Drop Zone -->
  <div class="dropzone" id="dropzone">
    <div class="drop-icon">📦</div>
    <div class="drop-title">ZIP 파일을 여기에 드래그하세요</div>
    <div class="drop-sub">또는 <span onclick="document.getElementById('fileInput').click()">파일 직접 선택</span> · .zip 파일만 지원</div>
    <input type="file" id="fileInput" multiple accept=".zip">
  </div>

  <!-- File List -->
  <div class="section-label" id="file-list-label" style="display:none">업로드된 파일</div>
  <div class="file-list" id="fileList"></div>
  <div class="empty-state" id="emptyState">파일을 추가하면 여기에 표시됩니다.</div>

  <!-- Options -->
  <div class="section-label">병합 옵션</div>
  <div class="options-grid">
    <label class="option-card">
      <input type="radio" name="merge" value="flat" checked>
      <div class="option-label">
        <div class="option-radio-dot"></div>
        <div class="option-info">
          <div class="option-title">📂 평면 병합</div>
          <div class="option-desc">모든 파일을 루트에 모아 폴더 구조 제거</div>
        </div>
      </div>
    </label>
    <label class="option-card">
      <input type="radio" name="merge" value="preserve">
      <div class="option-label">
        <div class="option-radio-dot"></div>
        <div class="option-info">
          <div class="option-title">🗂 구조 유지</div>
          <div class="option-desc">원본 폴더 구조를 그대로 병합</div>
        </div>
      </div>
    </label>
    <label class="option-card">
      <input type="radio" name="merge" value="subfolder">
      <div class="option-label">
        <div class="option-radio-dot"></div>
        <div class="option-info">
          <div class="option-title">📁 ZIP별 폴더</div>
          <div class="option-desc">각 ZIP 이름의 하위 폴더에 분리 보관</div>
        </div>
      </div>
    </label>
  </div>

  <!-- Rename checkbox -->
  <label class="checkbox-option" id="renameCheckWrap" onclick="toggleRename(this)">
    <input type="checkbox" id="renameCheck">
    <div class="checkbox-box" id="checkboxBox"></div>
    <span class="checkbox-text">✏️ 중복 파일명 자동 변경</span>
    <span class="checkbox-desc">동일 이름엔 번호 추가</span>
  </label>

  <!-- Output filename -->
  <div class="section-label">출력 파일명</div>
  <div class="output-row">
    <input type="text" class="input-field" id="outputName" placeholder="merged_output" value="merged_output">
    <div class="input-suffix">.zip</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-header">
      <span class="progress-label">처리중...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Button Row -->
  <div class="btn-row">
    <button class="merge-btn" id="mergeBtn" onclick="startMerge()" disabled>
      <span class="btn-icon">🔀</span>
      병합
    </button>
    <button class="download-btn" id="downloadBtn" onclick="doDownload()" disabled>
      <span class="btn-icon">⬇️</span>
      다운로드
    </button>
  </div>

  <!-- Log -->
  <div class="log-wrap" id="logWrap">
    <div class="section-label" style="margin-top:20px">처리 로그</div>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let files = [];
let totalEntries = 0;
let readyBlob = null;
let readyFileName = '';

let renameEnabled = false;

function toggleRename(wrap) {
  renameEnabled = !renameEnabled;
  wrap.classList.toggle('checked', renameEnabled);
  document.getElementById('checkboxBox').textContent = renameEnabled ? '✓' : '';
}

function getTodayStr() {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `_${yy}${mm}${dd}`;
}
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const mergeBtn = document.getElementById('mergeBtn');
const log = document.getElementById('log');

// Drag & Drop
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const dropped = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.zip'));
  addFiles(dropped);
});
fileInput.addEventListener('change', e => {
  addFiles(Array.from(e.target.files));
  fileInput.value = '';
});
dropzone.addEventListener('click', e => {
  if (e.target.tagName !== 'SPAN') fileInput.click();
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (!files.find(x => x.name === f.name && x.size === f.size)) {
      files.push({ file: f, status: 'waiting', id: Date.now() + Math.random() });
    }
  });
  renderFileList();
  updateStats();
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  renderFileList();
  updateStats();
}

function renderFileList() {
  const label = document.getElementById('file-list-label');
  label.style.display = files.length ? '' : 'none';
  fileList.innerHTML = '';

  files.forEach(f => {
    const item = document.createElement('div');
    item.className = `file-item status-${f.status}`;
    item.innerHTML = `
      <div class="file-icon">🗜️</div>
      <div class="file-info">
        <div class="file-name">${f.file.name}</div>
        <div class="file-meta">${formatSize(f.file.size)}</div>
      </div>
      <span class="file-status status-${f.status}">${statusLabel(f.status)}</span>
      ${f.status === 'waiting' ? `<button class="file-remove" onclick="removeFile(${f.id})" title="삭제">✕</button>` : ''}
    `;
    fileList.appendChild(item);
  });

  mergeBtn.disabled = files.length < 1;
}

function statusLabel(s) {
  return { waiting: '대기중', processing: '처리중', done: '완료', error: '오류' }[s] || s;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

async function updateStats() {
  document.getElementById('stat-files').textContent = files.length;
  const total = files.reduce((a, f) => a + f.file.size, 0);
  document.getElementById('stat-size').textContent = formatSize(total);

  // Count entries
  let count = 0;
  for (const f of files) {
    try {
      const zip = await JSZip.loadAsync(f.file);
      count += Object.keys(zip.files).filter(k => !zip.files[k].dir).length;
    } catch {}
  }
  totalEntries = count;
  document.getElementById('stat-entries').textContent = count > 0 ? count + '개' : '—';
}

function addLog(msg, type = '') {
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function startMerge() {
  if (files.length === 0) return;

  const mode = document.querySelector('input[name="merge"]:checked').value;
  const baseName = document.getElementById('outputName').value.trim() || 'merged_output';
  const outputName = baseName + getTodayStr();

  // Reset
  files.forEach(f => f.status = 'waiting');
  readyBlob = null;
  document.getElementById('downloadBtn').disabled = true;
  renderFileList();
  addLog('병합 시작', 'info');
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('logWrap').classList.add('visible');
  mergeBtn.disabled = true;
  setProgress(0);

  const merged = new JSZip();
  const fileNameCount = {};
  let processed = 0;

  for (const entry of files) {
    entry.status = 'processing';
    renderFileList();
    addLog(`📦 ${entry.file.name} 처리중...`, 'warn');

    try {
      const zip = await JSZip.loadAsync(entry.file);
      const zipBaseName = entry.file.name.replace(/\.zip$/i, '');
      let fileCount = 0;

      const allFiles = Object.entries(zip.files).filter(([, v]) => !v.dir);

      for (const [path, zipEntry] of allFiles) {
        const data = await zipEntry.async('uint8array');
        let targetPath;

        if (mode === 'flat') {
          const justName = path.split('/').pop();
          targetPath = justName;
        } else if (mode === 'preserve') {
          targetPath = path;
        } else if (mode === 'subfolder') {
          targetPath = `${zipBaseName}/${path}`;
        }

        // Apply rename if checkbox enabled
        if (renameEnabled) {
          const base = targetPath.includes('/') ? targetPath.split('/').slice(0, -1).join('/') + '/' : '';
          const justName = targetPath.split('/').pop();
          if (fileNameCount[justName] !== undefined) {
            fileNameCount[justName]++;
            const ext = justName.includes('.') ? '.' + justName.split('.').pop() : '';
            const nameBase = ext ? justName.slice(0, -ext.length) : justName;
            targetPath = `${base}${nameBase}_(${fileNameCount[justName]})${ext}`;
          } else {
            fileNameCount[justName] = 0;
          }
        }

        merged.file(targetPath, data);
        fileCount++;
      }

      entry.status = 'done';
      addLog(`✓ ${entry.file.name} → ${fileCount}개 파일 추가`, 'ok');
    } catch (e) {
      entry.status = 'error';
      addLog(`✕ ${entry.file.name} 오류: ${e.message}`, 'err');
    }

    processed++;
    setProgress((processed / files.length) * 90);
    renderFileList();
  }

  addLog('최종 ZIP 생성중...', 'info');
  setProgress(95);

  try {
    const blob = await merged.generateAsync({
      type: 'blob',
      mimeType: 'application/zip',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    }, meta => setProgress(95 + meta.percent * 0.05));

    readyBlob = blob;
    readyFileName = outputName;

    setProgress(100);
    addLog(`✅ ZIP 생성 완료 (${formatSize(blob.size)}) — 아래 다운로드 버튼을 클릭하세요.`, 'ok');
    showToast('ZIP 생성 완료! 다운로드 버튼을 눌러주세요.');
    document.getElementById('downloadBtn').disabled = false;
  } catch (e) {
    addLog('ZIP 생성 실패: ' + e.message, 'err');
    showToast('오류가 발생했습니다.', 'error');
  }

  mergeBtn.disabled = false;
}

function doDownload() {
  if (!readyBlob) return;
  const url = URL.createObjectURL(readyBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = readyFileName + '.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  addLog(`🎉 다운로드 시작 → ${readyFileName}.zip`, 'ok');
}
</script>
</body>
</html>
